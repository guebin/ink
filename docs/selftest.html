<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Ink self-test</title>
<style>
  body {
    margin: 0; display: grid; grid-template-rows: auto 1fr; height: 100vh;
    background: #101114; color: #e8e9ec;
    font: 14px/1.6 ui-monospace, Menlo, monospace;
  }
  #report { padding: 16px 20px; white-space: pre-wrap; overflow: auto; max-height: 45vh; }
  .ok { color: #6ee787; } .bad { color: #ff7b72; }
  iframe { width: 100%; height: 100%; border: 0; border-top: 1px solid #3a3d42; }
</style>
</head>
<body>
<div id="report">running…</div>
<!-- Drive the real page, so the test can't drift from the markup it ships. -->
<iframe id="app" src="index.html"></iframe>

<script>
const frame = document.getElementById('app');

frame.addEventListener('load', async () => {
  const w = frame.contentWindow;
  const d = frame.contentDocument;
  const out = [];
  const check = async (name, fn) => {
    try {
      const v = await fn();
      out.push(`<span class="ok">PASS</span>  ${name}${v ? ` — ${v}` : ''}`);
    } catch (e) {
      out.push(`<span class="bad">FAIL</span>  ${name} — ${e && (e.stack || e.message || e)}`);
    }
    document.getElementById('report').innerHTML = out.join('\n');
  };

  // The app removes the hint pill at startup; reproduce that state so the
  // test runs against what ships, not a friendlier variant.
  d.getElementById('hint')?.remove();

  // ?visual — just open the editor with sample content, for eyeballing it
  if (location.search.includes('visual')) {
    w.eval('openEditor(null, null)');
    const src = d.getElementById('src');
    src.value = '## 이차방정식\n\n$ax^2 + bx + c = 0$ 의 두 근은\n\n'
      + '$$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n\n'
      + '판별식 $D = b^2 - 4ac$ 에 따라\n\n'
      + '| 판별식 | 근 |\n|------|------|\n'
      + '| $D > 0$ | 서로 다른 두 실근 |\n| $D = 0$ | 중근 |\n| $D < 0$ | 서로 다른 두 허근 |';
    src.dispatchEvent(new w.Event('input'));
    document.getElementById('report').textContent = '(visual mode)';
    return;
  }

  // top-level `const`s live in the script scope, not on window — evaluate
  // inside the frame to reach them
  const js = (code) => w.eval(code);

  const canvas = d.getElementById('ink');
  const send = (type, x, y) => canvas.dispatchEvent(new w.PointerEvent(type, {
    pointerId: 1, bubbles: true, cancelable: true, clientX: x, clientY: y, button: 0,
  }));
  const drag = (x1, y1, x2, y2) => {
    send('pointerdown', x1, y1);
    send('pointermove', (x1 + x2) / 2, (y1 + y2) / 2);
    send('pointermove', x2, y2);
    send('pointerup', x2, y2);
  };
  const js2setTool = (tool) => js(`setTool(${JSON.stringify(tool)})`);
  const rect = () => canvas.getBoundingClientRect();
  const screenOf = (wx, wy) => [
    (wx - js('state.cam.x')) * js('state.cam.z') + rect().left,
    (wy - js('state.cam.y')) * js('state.cam.z') + rect().top,
  ];

  await check('starts on an empty board', () =>
    (js('state.strokes.length') || js('state.items.length'))
      ? Promise.reject(new Error('board is not empty'))
      : 'no strokes, no items');

  await check('pen draws', () => {
    js2setTool('pen');
    drag(300, 400, 460, 520);
    if (js('state.strokes.length') !== 1) throw new Error('no stroke was added');
    return `${js('state.strokes[0].pts.length')} points`;
  });

  await check('highlighter is wide and yellow', () => {
    js2setTool('highlighter');
    drag(300, 560, 500, 560);
    const s = js('state.strokes.at(-1)');
    if (s.kind !== 'highlighter') throw new Error('wrong kind: ' + s.kind);
    return `${s.color} · ${s.width}px`;
  });

  await check('eraser removes a stroke', () => {
    js2setTool('eraser');
    const before = js('state.strokes.length');
    drag(300, 560, 500, 560);
    if (js('state.strokes.length') >= before) throw new Error('nothing erased');
    return `${before} → ${js('state.strokes.length')}`;
  });

  await check('rectangle tool', () => {
    js2setTool('rect');
    const before = js('state.strokes.length');
    drag(600, 400, 760, 500);
    if (js('state.strokes.length') !== before + 1) throw new Error('no rect');
    return js('state.strokes.at(-1).kind');
  });

  await check('select moves a stroke', () => {
    js2setTool('select');
    const s = js('state.strokes[0]');
    const x0 = s.pts[0][0];
    const [px, py] = screenOf(s.pts[0][0], s.pts[0][1]);
    drag(px, py, px + 40, py);
    if (Math.abs(s.pts[0][0] - x0) < 1) throw new Error('stroke did not move');
    return `moved ${Math.round(s.pts[0][0] - x0)}px`;
  });

  await check('Esc returns to the pointer', () => {
    js2setTool('eraser');
    d.dispatchEvent(new w.KeyboardEvent('keydown', { code: 'Escape', bubbles: true }));
    if (js('state.tool') !== 'select') throw new Error('tool is ' + js('state.tool'));
    return 'select';
  });

  await check('a new editor opens empty, insert disabled', () => {
    js('openEditor(null, null)');
    const src = d.getElementById('src');
    if (src.value !== '') throw new Error('editor was prefilled');
    if (!d.getElementById('insertBtn').disabled) {
      throw new Error('insert should be disabled while empty');
    }
    return 'empty · insert off';
  });

  await check('editor previews math and tables', async () => {
    const src = d.getElementById('src');
    src.value = '## 이차\n\n$$x = \\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}$$\n\n| a | b |\n|---|---|\n| 1 | 2 |';
    src.dispatchEvent(new w.Event('input'));
    await new Promise((r) => setTimeout(r, 350));
    const p = d.getElementById('preview');
    if (!p.querySelector('.katex')) throw new Error('math did not render');
    if (!p.querySelector('table')) throw new Error('table did not render');
    return 'math + table';
  });

  await check('formatting button wraps the selection', () => {
    const src = d.getElementById('src');
    src.value = 'hello';
    src.selectionStart = 0; src.selectionEnd = 5;
    d.querySelector('#mdbar button[data-md="b"]').click();
    if (src.value !== '**hello**') throw new Error('got: ' + src.value);
    return src.value;
  });

  await check('inserting the card closes the editor', () => {
    const src = d.getElementById('src');
    src.value = '$$e^{i\\pi} + 1 = 0$$';
    d.getElementById('insertBtn').click();
    if (!d.getElementById('modal').hidden) throw new Error('editor stayed open');
    if (!js('state.items.length')) throw new Error('no card was added');
    return `${js('state.items.length')} card`;
  });

  await check('double-click reopens a card for editing', async () => {
    await new Promise((r) => setTimeout(r, 200));
    const item = js('state.items.at(-1)');
    const [px, py] = screenOf(item.x + item.w / 2, item.y + item.h / 2);
    canvas.dispatchEvent(new w.MouseEvent('dblclick', {
      bubbles: true, cancelable: true, clientX: px, clientY: py,
    }));
    if (d.getElementById('modal').hidden) throw new Error('editor did not open');
    const src = d.getElementById('src').value;
    if (src !== item.source) throw new Error('editor holds different source');
    d.getElementById('cancelBtn').click();
    return 'source loaded';
  });

  await check('card box matches the rendered card', async () => {
    await new Promise((r) => setTimeout(r, 400));   // let fonts settle
    const item = js('state.items.at(-1)');
    const el = d.querySelectorAll('#overlay .item.card');
    const node = el[el.length - 1];
    const dh = node.offsetHeight, dw = node.offsetWidth;
    if (Math.abs(dh - item.nh) > 1 || Math.abs(dw - item.nw) > 1) {
      throw new Error(`box ${Math.round(item.nw)}×${Math.round(item.nh)} vs rendered ${dw}×${dh}`);
    }
    return `${dw}×${dh}`;
  });

  await check('save and reload', async () => {
    const json = await w.inkNative.serialize();
    w.inkNative.load(json);
    return `${js('state.strokes.length')} strokes, ${js('state.items.length')} items`;
  });

  await check('export PNG', async () => {
    const url = await w.inkNative.exportPNG();
    if (!url || !url.startsWith('data:image/png')) throw new Error('no png');
    return `${Math.round(url.length / 1024)} KB`;
  });

  const failed = out.filter((l) => l.includes('FAIL')).length;
  out.unshift(failed
    ? `<span class="bad">${failed} failing</span>\n`
    : '<span class="ok">all good</span>\n');
  document.getElementById('report').innerHTML = out.join('\n');
});
</script>
</body>
</html>
